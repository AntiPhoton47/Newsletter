name: Publish Newsletter Site

on:
  push:
    paths:
      - "issues/daily/**"
      - "scripts/build_archive.py"
      - "scripts/send_daily_newsletter.py"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: pages
        uses: actions/configure-pages@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build archive
        env:
          NEWSLETTER_BASEURL: ${{ steps.pages.outputs.base_path }}
          NEWSLETTER_SITE_URL: ${{ steps.pages.outputs.base_url }}
        run: python3 scripts/build_archive.py
      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./site
          destination: ./_site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
